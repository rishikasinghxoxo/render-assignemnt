<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentFlow • Information System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            padding: 24px;
            color: #1e293b;
        }

        /* Modern Glassmorphism Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Animated Gradient Header */
        h1 {
            text-align: center;
            font-size: 2.75rem;
            font-weight: 800;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 300% 300%;
            animation: gradient 8s ease infinite;
            letter-spacing: -0.5px;
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Main Layout */
        .main-content {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 32px;
            margin-bottom: 32px;
        }

        /* Form Card */
        .form-card {
            background: white;
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1);
            border: 1px solid #f1f5f9;
        }

        .form-card h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-card h2::before {
            content: "✨";
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: #94a3b8;
            font-size: 1.2rem;
        }

        input, select {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #f8fafc;
            color: #1e293b;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        input:hover, select:hover {
            border-color: #94a3b8;
        }

        /* Modern Button */
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            padding: 16px 32px;
            border: none;
            border-radius: 24px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 30px -10px rgba(59, 130, 246, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0));
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .btn-primary:hover::after {
            transform: translateX(100%);
        }

        /* Filter Card */
        .filter-card {
            background: white;
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1);
            border: 1px solid #f1f5f9;
        }

        .filter-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .filter-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-header h2::before {
            content: "🔍";
            font-size: 1.8rem;
        }

        .filter-input-group {
            display: flex;
            gap: 12px;
        }

        .filter-input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        .filter-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .filter-select {
            min-width: 200px;
            padding: 14px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            font-size: 1rem;
            background: #f8fafc;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .filter-select option {
            padding: 12px;
        }

        /* Student Info Display */
        .student-info-card {
            background: linear-gradient(135deg, #f8fafc, #ffffff);
            border-radius: 24px;
            padding: 30px;
            margin-top: 20px;
            border: 2px solid #e2e8f0;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .selected-student-info {
            width: 100%;
        }

        .info-placeholder {
            text-align: center;
            color: #94a3b8;
        }

        .info-placeholder-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .info-placeholder h3 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: #64748b;
        }

        /* Student Details Grid */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .detail-item-modern {
            background: white;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            transition: transform 0.3s;
        }

        .detail-item-modern:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px -10px rgba(59, 130, 246, 0.2);
        }

        .detail-icon {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .detail-label-modern {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #64748b;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .detail-value-modern {
            font-size: 1.4rem;
            font-weight: 700;
            color: #0f172a;
        }

        .progress-bar-modern {
            width: 100%;
            height: 12px;
            background: #e2e8f0;
            border-radius: 20px;
            margin-top: 12px;
            overflow: hidden;
        }

        .progress-fill-modern {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 20px;
            transition: width 0.3s ease;
        }

        /* Bottom Stats Section */
        .bottom-stats {
            margin-top: 32px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px -15px rgba(0, 0, 0, 0.1);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -15px rgba(59, 130, 246, 0.3);
            border-color: #3b82f6;
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #64748b;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Gender Badge */
        .gender-badge-large {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 8px;
        }

        .bg-male { background: #dbeafe; color: #1e40af; }
        .bg-female { background: #fce7f3; color: #9d174d; }
        .bg-other { background: #ede9fe; color: #5b21b6; }

        /* Alert System */
        .alert {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 16px 28px;
            border-radius: 60px;
            background: white;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.2);
            display: none;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            z-index: 2000;
            animation: slideInRight 0.3s;
            border-left: 4px solid;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .alert-success {
            border-left-color: #10b981;
            color: #065f46;
        }

        .alert-error {
            border-left-color: #ef4444;
            color: #991b1b;
        }

        .alert-icon {
            font-size: 1.5rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .bottom-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .details-grid {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }

            .filter-input-group {
                flex-direction: column;
            }

            .filter-select {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>StudentFlow</h1>
        
        <div class="main-content">
            <!-- Left Side - Form -->
            <div class="form-card">
                <h2>Add New Student</h2>
                <form id="studentForm">
                    <div class="form-group">
                        <label for="student_name">Full Name</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="student_name" name="student_name" 
                                   required placeholder="Enter student's full name">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <div class="input-wrapper">
                            <span class="input-icon">⚥</span>
                            <select id="gender" name="gender" required>
                                <option value="" disabled selected>Select gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="sap_id">SAP ID</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🆔</span>
                            <input type="text" id="sap_id" name="sap_id" required 
                                   maxlength="11" pattern="\d{11}" 
                                   placeholder="11-digit SAP ID"
                                   oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        </div>
                        <small style="color: #64748b; margin-top: 4px; display: block;">
                            Must be exactly 11 digits
                        </small>
                    </div>
                    
                    <div class="form-group">
                        <label for="gmail">Gmail Address</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📧</span>
                            <input type="email" id="gmail" name="gmail" required 
                                   placeholder="student@gmail.com"
                                   pattern="[a-zA-Z0-9._%+-]+@gmail\.com$"
                                   title="Must be a valid Gmail address">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="marks">Marks (0-100)</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📊</span>
                            <input type="number" id="marks" name="marks" required 
                                   min="0" max="100" step="0.01"
                                   placeholder="Enter marks"
                                   oninput="this.value = Math.min(100, Math.max(0, this.value))">
                        </div>
                        <small style="color: #64748b; margin-top: 4px; display: block;">
                            Must be between 0 and 100
                        </small>
                    </div>
                    
                    <button type="submit" class="btn-primary">
                        Add to Database
                    </button>
                </form>
            </div>
            
            <!-- Right Side - Filter and Student Info -->
            <div class="filter-card">
                <div class="filter-header">
                    <h2>Student Lookup</h2>
                </div>
                
                <div class="filter-input-group">
                    <input type="text" id="searchInput" class="filter-input" 
                           placeholder="Type to search students..." 
                           onkeyup="filterStudents()">
                    <select id="studentSelect" class="filter-select" onchange="showSelectedStudent()">
                        <option value="">Select a student</option>
                        {% for student in students %}
                        <option value="{{ student.id }}">{{ student.student_name }} (SAP: {{ student.sap_id }})</option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Selected Student Information Display -->
                <div id="studentInfoDisplay" class="student-info-card">
                    <div class="info-placeholder">
                        <div class="info-placeholder-icon">👨‍🎓</div>
                        <h3>Select a student</h3>
                        <p>Choose from the dropdown above to view details</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Bottom Generic Stats Section -->
        <div class="bottom-stats" id="statsSection">
            <div class="stat-card">
                <div class="stat-icon">📚</div>
                <div class="stat-label">Total Students</div>
                <div class="stat-value" id="totalStudents">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-label">Average Marks</div>
                <div class="stat-value" id="avgMarks">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🏆</div>
                <div class="stat-label">Highest Marks</div>
                <div class="stat-value" id="maxMarks">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📉</div>
                <div class="stat-label">Lowest Marks</div>
                <div class="stat-value" id="minMarks">0</div>
            </div>
        </div>
    </div>

    <!-- Alert Container -->
    <div id="alert" class="alert"></div>

    <script>
        // Store students data globally
        let studentsData = {{ students|tojson }};
        
        // Load stats on page load
        document.addEventListener('DOMContentLoaded', function() {
            updateStats();
        });

        // Filter students based on search input
        function filterStudents() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const select = document.getElementById('studentSelect');
            
            // Filter options
            for (let option of select.options) {
                if (option.value === '') continue; // Skip the first option
                const text = option.text.toLowerCase();
                option.style.display = text.includes(searchTerm) ? 'block' : 'none';
            }
        }

        // Show selected student details
        async function showSelectedStudent() {
            const studentId = document.getElementById('studentSelect').value;
            
            if (!studentId) {
                document.getElementById('studentInfoDisplay').innerHTML = `
                    <div class="info-placeholder">
                        <div class="info-placeholder-icon">👨‍🎓</div>
                        <h3>Select a student</h3>
                        <p>Choose from the dropdown above to view details</p>
                    </div>
                `;
                return;
            }
            
            try {
                const response = await fetch(`/get_student/${studentId}`);
                const student = await response.json();
                
                if (response.ok) {
                    displayStudentInfo(student);
                } else {
                    showAlert('❌ Error loading student details', 'error');
                }
            } catch (error) {
                showAlert('❌ Network error', 'error');
            }
        }

        // Display student information in the card
        function displayStudentInfo(student) {
            const genderClass = student.gender.toLowerCase() === 'male' ? 'bg-male' : 
                               student.gender.toLowerCase() === 'female' ? 'bg-female' : 'bg-other';
            
            const marksPercentage = (student.marks / 100) * 100;
            
            document.getElementById('studentInfoDisplay').innerHTML = `
                <div class="selected-student-info">
                    <h2 style="font-size: 2rem; margin-bottom: 20px; color: #0f172a;">${escapeHtml(student.student_name)}</h2>
                    
                    <div class="details-grid">
                        <div class="detail-item-modern">
                            <div class="detail-icon">🆔</div>
                            <span class="detail-label-modern">SAP ID</span>
                            <div class="detail-value-modern">${escapeHtml(student.sap_id)}</div>
                        </div>
                        
                        <div class="detail-item-modern">
                            <div class="detail-icon">⚥</div>
                            <span class="detail-label-modern">Gender</span>
                            <div class="detail-value-modern">
                                <span class="gender-badge-large ${genderClass}">${escapeHtml(student.gender)}</span>
                            </div>
                        </div>
                        
                        <div class="detail-item-modern">
                            <div class="detail-icon">📧</div>
                            <span class="detail-label-modern">Email</span>
                            <div class="detail-value-modern" style="font-size: 1rem;">${escapeHtml(student.gmail)}</div>
                        </div>
                        
                        <div class="detail-item-modern">
                            <div class="detail-icon">📊</div>
                            <span class="detail-label-modern">Marks</span>
                            <div class="detail-value-modern">${escapeHtml(student.marks)} / 100</div>
                            <div class="progress-bar-modern">
                                <div class="progress-fill-modern" style="width: ${marksPercentage}%;"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="margin-top: 20px; text-align: right; color: #64748b;">
                        Registered: ${escapeHtml(new Date(student.created_at).toLocaleDateString())}
                    </div>
                </div>
            `;
        }

        // Form submission handler
        document.getElementById('studentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const sapId = formData.get('sap_id');
            const gmail = formData.get('gmail');
            const marks = formData.get('marks');
            
            // Validate SAP ID
            if (!/^\d{11}$/.test(sapId)) {
                showAlert('❌ SAP ID must be exactly 11 digits', 'error');
                return;
            }
            
            // Validate Gmail
            if (!gmail.toLowerCase().endsWith('@gmail.com')) {
                showAlert('❌ Email must be a valid Gmail address', 'error');
                return;
            }
            
            // Validate Marks
            if (marks < 0 || marks > 100) {
                showAlert('❌ Marks must be between 0 and 100', 'error');
                return;
            }
            
            // Show loading state
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Adding...';
            submitBtn.disabled = true;
            
            try {
                const response = await fetch('/add_student', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('✅ Student added successfully!', 'success');
                    this.reset();
                    
                    // Add new option to select dropdown
                    const select = document.getElementById('studentSelect');
                    const option = document.createElement('option');
                    option.value = data.student.id;
                    option.text = `${data.student.student_name} (SAP: ${data.student.sap_id})`;
                    select.appendChild(option);
                    
                    // Update stats
                    updateStats();
                    
                } else {
                    showAlert(`❌ ${data.error || 'Error adding student'}`, 'error');
                }
            } catch (error) {
                showAlert('❌ Network error. Please try again.', 'error');
                console.error('Error:', error);
            } finally {
                // Reset button state
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });

        // Update bottom stats
        async function updateStats() {
            try {
                const response = await fetch('/student_stats');
                const stats = await response.json();
                
                if (response.ok) {
                    document.getElementById('totalStudents').textContent = stats.total_students;
                    document.getElementById('avgMarks').textContent = stats.avg_marks;
                    document.getElementById('maxMarks').textContent = stats.max_marks;
                    document.getElementById('minMarks').textContent = stats.min_marks;
                }
            } catch (error) {
                console.error('Error updating stats:', error);
            }
        }
        
        // Show alert message
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `
                <span class="alert-icon">${type === 'success' ? '✅' : '❌'}</span>
                <span>${escapeHtml(message)}</span>
            `;
            alert.style.display = 'flex';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }
        
        // Helper function to escape HTML
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return String(unsafe)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
